site_name: TAIC Smart Tools Documentation
site_description: Documentation for TAIC Smart Tools - AI-powered assistant and knowledge search platform
site_author: James Thompson
repo_url: https://github.com/1jamesthompson1/TAIC-smart-tools
repo_name: 1jamesthompson1/TAIC-smart-tools

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            merge_init_into_class: true
            docstring_section_style: table

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - User Guide:
      - Overview: user-guide/overview.md
      - Smart Assistant: user-guide/assistant.md
      - Knowledge Search: user-guide/search.md
  - Developer Guide:
      - Getting Started: developer-guide/getting-started.md
      - Architecture: developer-guide/architecture.md
      - Contributing: developer-guide/contributing.md
  - API Reference:
      - Overview: api/index.md
      - Assistant: api/assistant.md
      - Assistant Tools: api/assistanttools.md
      - Searching: api/searching.md
      - Storage: api/storage.md
      - Version: api/version.md

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/1jamesthompson1/TAIC-smart-tools
