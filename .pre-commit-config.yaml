repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version. Keep in sync with pyproject.toml and .github/workflows/ci.yml.
  rev: v0.15.21
  hooks:
    # Run the linter.
    - id: ruff-check
      types_or: [ python, pyi ]
      args: [ --fix ]
    # Run the formatter.
    - id: ruff-format
      types_or: [ python, pyi ]
- repo: https://github.com/srstevenson/nb-clean
  rev: 4.0.1
  hooks:
    - id: nb-clean